name: 'Terraform Deploy'

on:
  push:
    branches: [ "main" ]

jobs:
  terraform:
    name: 'Terraform Plan and Apply'
    runs-on: ubuntu-latest

    # Map your GitHub Secrets to the exact names Terraform reads
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
    # 1. Pull down your code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Setup the Terraform CLI environment
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # 3. Initialize working directory and connect to Azure Remote State
    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
          -backend-config="client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
          -backend-config="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
          -backend-config="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}"

    # 4. Generate the preview plan (Shows you what will happen)
    - name: Terraform Plan
      run: terraform plan

    # 5. Execute the changes automatically (-auto-approve skips interactive prompts)
    - name: Terraform Apply
      run: terraform apply -auto-approve
